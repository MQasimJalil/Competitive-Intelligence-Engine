services:
  backend:
    build:
      context: .
    container_name: competitor-brief-backend
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      APP_BASE_URL: http://127.0.0.1:49160
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-${DATABASE_URL:-postgresql://competitor:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/competitor_brief}}
      JOB_REPOSITORY: ${JOB_REPOSITORY:-postgres}
      USER_REPOSITORY: ${USER_REPOSITORY:-postgres}
      CREDIT_REPOSITORY: ${CREDIT_REPOSITORY:-postgres}
      RENDERED_BROWSER_ENABLED: "false"
      RENDERED_BROWSER_CHANNEL: ""
      APIFY_TIMEOUT_SECONDS: "35"
      APIFY_DEEP_SOCIAL_ENABLED: "false"
      APIFY_REDDIT_ENABLED: "false"
      APIFY_SEARCH_ENABLED: "false"
      APIFY_WEBSITE_CONTENT_ENABLED: "false"
    ports:
      - "127.0.0.1:49160:8000"
    volumes:
      - competitor_brief_app_data:/app/var
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    profiles:
      - local-postgres
    image: postgres:17-alpine
    container_name: competitor-brief-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: competitor_brief
      POSTGRES_USER: competitor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "127.0.0.1:54329:5432"
    volumes:
      - competitor_brief_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U competitor -d competitor_brief"]
      interval: 3s
      timeout: 3s
      retries: 10

  tests:
    build:
      context: .
    profiles:
      - test
    environment:
      AI_ANALYSIS_ENABLED: "false"
      JOB_REPOSITORY: file
      USER_REPOSITORY: file
      CREDIT_REPOSITORY: file
      RENDERED_BROWSER_ENABLED: "false"
    command: python -m pytest -q

volumes:
  competitor_brief_app_data:
  competitor_brief_postgres_data:
